# Roboppi Self-Dev Loop: implement Swarm (Agent Teams / Mailbox)
#
# Run (from the Roboppi repo root):
#   make impl
#
# Or directly:
#   bun run src/workflow/run.ts examples/swarm-impl-loop.yaml --workspace . --verbose

name: swarm-impl-loop
version: "1"
description: "Roboppi self-dev: implement Swarm file mailbox + tasks + CLI"
timeout: "600m"
concurrency: 1
create_branch: true
branch_transition_step: "branch"

steps:
  bootstrap:
    description: "Initialize loop state (.roboppi-loop/*)."
    worker: CUSTOM
    instructions: |
      bash "${ROBOPPI_ROOT:-.}/scripts/self-dev/swarm/bootstrap.sh"
    capabilities: [READ, EDIT, RUN_COMMANDS]
    timeout: "2m"

  branch:
    description: "Create or reuse a working branch"
    worker: CUSTOM
    depends_on: [bootstrap]
    instructions: |
      bash "${ROBOPPI_ROOT:-.}/scripts/agent-pr-loop/branch.sh"
    capabilities: [READ, RUN_COMMANDS]
    timeout: "1m"

  todo:
    description: "Convert Swarm design into an implementation TODO checklist"
    worker: OPENCODE
    model: "openai/gpt-5.2"
    depends_on: [branch]
    instructions: |
      You are OpenCode.

      Task: Convert the Swarm design into a concrete TODO checklist.

      Read (by exact file path):
      - .roboppi-loop/request.md
      - docs/features/swarm.md
      - docs/spec/swarm.md
      - docs/design.md
      - src/types/worker-task.ts
      - src/worker/adapters/claude-code-adapter.ts

      Note: do not rely on file-globbing for dot-directories; `.roboppi-loop/*`
      may not be discoverable via glob in some tool environments.

      Write/update:
      - .roboppi-loop/todo.md

      Requirements:
      - Use Markdown checklist items: "- [ ] ..."
      - Group by milestones (MVP first; then follow-ups)
      - Include file paths and symbols when possible
      - Include explicit test tasks (at least: make typecheck, make test-all)
      - Add explicit conformance tasks for `docs/spec/swarm.md` section 3.1-3.6 and section 5 checklist.
      - If any spec item is partial/missing, add at least one concrete task per gap (code + test).
      - Keep scope aligned to .roboppi-loop/request.md
    capabilities: [READ, EDIT]
    timeout: "25m"
    on_failure: retry
    max_retries: 2

    completion_check:
      worker: CUSTOM
      instructions: |
        bash "${ROBOPPI_ROOT:-.}/scripts/agent-pr-loop/todo-check.sh"
      capabilities: [READ, RUN_COMMANDS]
      timeout: "30s"

    max_iterations: 3
    on_iterations_exhausted: abort
    outputs:
      - name: todo
        path: ".roboppi-loop/todo.md"
        type: review

  implement:
    description: "Implement Swarm; tests+review in completion_check; repeat until PASS"
    worker: CLAUDE_CODE
    model: "claude-opus-4-6"
    depends_on: [todo]
    instructions: |
      You are Claude Code.

      Important: you are running as Claude Code via Roboppi.
      - Read `.roboppi-loop/*` by file path (do not rely on globbing dot-directories).

      Read:
      - .roboppi-loop/request.md
      - docs/features/swarm.md
      - docs/spec/swarm.md
      - .roboppi-loop/todo.md
      - .roboppi-loop/review.md (if present)
      - .roboppi-loop/fix.md (if present)

      Task:
      - If .roboppi-loop/fix.md exists and is non-empty, apply ONLY those fixes (minimal, targeted changes).
      - Otherwise, implement the TODO checklist items (focus on the MVP first).
      - Give priority to unresolved MUST items in `docs/spec/swarm.md` section 3.
      - Update the TODO checkboxes as you complete items.
      - Keep changes focused; avoid drive-by refactors.

      Notes:
      - Tests are run in the completion_check phase; focus here on implementation and documentation updates.
    capabilities: [READ, EDIT, RUN_TESTS, RUN_COMMANDS]
    timeout: "90m"
    on_failure: retry
    max_retries: 1

    convergence:
      enabled: true
      stall_threshold: 2
      max_stage: 3
      fail_on_max_stage: true

    completion_check:
      worker: OPENCODE
      model: "openai/gpt-5.2"
      variant: "xhigh"
      decision_file: ".roboppi-loop/review.verdict"
      instructions: |
        You are OpenCode.

        Sandbox rule:
        - Do NOT read or write outside the workspace directory.
        - Treat `/tmp/**` as forbidden (Roboppi will auto-reject external_directory reads).
        - If you need temp files/dirs, use `.roboppi-loop/tmp/*`.

        Task:
        1) Run tests:
           - make test-all
        2) Review the changes against the request + TODO + `docs/features/swarm.md` + `docs/spec/swarm.md`.
        3) Write/update:
           - .roboppi-loop/review.md
           - .roboppi-loop/review.verdict (single-line JSON; see Output rules)
        4) If verdict is FAIL, also write/update:
           - .roboppi-loop/fix.md (non-empty; concrete, actionable steps; include file paths)
        5) If verdict is PASS:
           - Clear .roboppi-loop/fix.md if it exists (truncate to empty)

        Before reviewing, generate deterministic review inputs:
        - bash "${ROBOPPI_ROOT:-.}/scripts/agent-pr-loop/review-inputs.sh"

        Debugging rule (branch verification):
        - If `make test-all` fails in the branch verification phase and you need logs,
          re-run branch verification with a verify dir INSIDE the workspace, e.g.:
          - bash "bash tests/branch/run-branch-verification.sh .roboppi-loop/tmp/branch-verify"
        - Do not use `mktemp -d /tmp/...`.

        You must read at least:
        - .roboppi-loop/request.md
        - docs/features/swarm.md
        - docs/spec/swarm.md
        - .roboppi-loop/todo.md
        - .roboppi-loop/review.base_ref
        - .roboppi-loop/review.diff
        - .roboppi-loop/review.status
        - .roboppi-loop/review.untracked
        - .roboppi-loop/review.untracked.diff

        Format for .roboppi-loop/review.md:
        - Sections: Summary, Conformance, Issues, Verification
        - In Conformance, include `docs/spec/swarm.md` section 3.1-3.6 as:
          - status: implemented | partial | missing
          - evidence: file paths and symbols
          - required fixes (for partial/missing)

        Output rules:
        - Write .roboppi-loop/review.verdict as a single-line JSON object:
          - complete => {"decision":"complete","check_id":"$ROBOPPI_COMPLETION_CHECK_ID"}
          - incomplete => {"decision":"incomplete","check_id":"$ROBOPPI_COMPLETION_CHECK_ID"}
        - Verdict policy:
          - If any MUST requirement in `docs/spec/swarm.md` section 3 is partial or missing, verdict MUST be `incomplete`.
          - If all section 3 MUST requirements are implemented and tests pass, verdict MAY be `complete`.
        - When FAIL, also include:
          - "reasons": ["..."]
          - "fingerprints": ["..."]
        - Fingerprints should be stable across iterations (e.g. test name, file:line, or subcommand id).
      capabilities: [READ, EDIT, RUN_TESTS, RUN_COMMANDS]
      timeout: "120m"

    max_iterations: 10
    on_iterations_exhausted: abort
    outputs:
      - name: review
        path: ".roboppi-loop/review.md"
        type: review
      - name: verdict
        path: ".roboppi-loop/review.verdict"
        type: text
      - name: fix
        path: ".roboppi-loop/fix.md"
        type: review
